<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代辦事項清單</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/zh-tw.js"></script>
</head>
<body>

    <div class="todo-container">
        <h1 class="neon-white-title">代辦事項清單</h1>
        
        <div class="stats-container">
            <div class="stat-item">
                <div class="stat-val" id="count-all">0</div>
                <div class="stat-lbl">全部</div>
            </div>
            <div class="stat-item">
                <div class="stat-val" id="count-active">0</div>
                <div class="stat-lbl">進行中</div>
            </div>
            <div class="stat-item">
                <div class="stat-val" id="count-completed">0</div>
                <div class="stat-lbl">已完成</div>
            </div>
        </div>

        <div class="view-switch-row">
            <button class="view-btn active" id="view-list-btn">📝 清單模式</button>
            <button class="view-btn" id="view-calendar-btn">📅 日曆視圖</button>
        </div>

        <div class="filter-tabs" id="list-filter-tabs">
            <button class="tab-btn active" data-filter="all">🌟 全部</button>
            <button class="tab-btn" data-filter="active">⏳ 進行中</button>
            <button class="tab-btn" data-filter="completed">✅ 已完成</button>
        </div>
        
        <div class="input-group">
            <input type="text" id="todo-input" placeholder="新增一項任務...">
            <div class="input-row">
                <input type="date" id="todo-date">
                <select id="todo-priority">
                    <option value="normal">☕ 一般</option>
                    <option value="high">🔥 重要</option>
                </select>
                <select id="todo-tag">
                    <option value="life">☕ 生活</option>
                    <option value="work">🔥 工作</option>
                    <option value="study">📝 學習</option>
                    <option value="sport">🏆 運動</option>
                </select>
                <button class="add-btn" id="add-button">新增任務</button>
            </div>
        </div>

        <div class="action-row" id="list-action-row">
            <select id="sort-select" class="sort-btn">
                <option value="none">🔄 選擇排序方式</option>
                <option value="date">📅 依截止日期排序</option>
                <option value="priority">🔥 依重要度優先排序</option>
            </select>
            <button class="clear-btn" id="clear-all">清除所有任務</button>
        </div>

        <div id="list-wrapper">
            <ul id="todo-list"></ul>
            <div id="empty-msg" class="empty-state">目前沒有任何待辦事項，來新增一個吧！</div>
        </div>

        <div id="calendar-view" style="display: none;"></div>

        <div class="theme-switcher-bottom">
            <span class="theme-lbl">🎨 切換美學主題：</span>
            <button class="theme-btn active" data-theme="aurora">🌌 極光</button>
            <button class="theme-btn" data-theme="cyber">🏮 朋克</button>
            <button class="theme-btn" data-theme="forest">🍃 森林</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
