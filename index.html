<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待辦事項清單</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="todo-container">
        <h1 class="neon-white-title">待辦事項清單</h1>
        
        <div class="stats-container">
            <div class="stat-item">
                <div class="stat-val" id="count-all">0</div>
                <div class="stat-lbl">全部</div>
            </div>
            <div class="stat-item">
                <div class="stat-val" id="count-active">0</div>
                <div class="stat-lbl">進行中</div>
            </div>
            <div class="stat-item">
                <div class="stat-val" id="count-completed">0</div>
                <div class="stat-lbl">已完成</div>
            </div>
        </div>
        
        <div class="input-group">
            <input type="text" id="todo-input" placeholder="新增一項任務...">
            <div class="input-row">
                <input type="date" id="todo-date">
                <button class="add-btn" id="add-button">新增任務</button>
            </div>
        </div>

        <div class="action-row">
            <button class="clear-btn" id="clear-all">清除所有任務</button>
        </div>

        <ul id="todo-list"></ul>
        <div id="empty-msg" class="empty-state">目前沒有任何待辦事項，來新增一個吧！</div>
    </div>

    <script>
        const todoInput = document.getElementById('todo-input');
        const todoDate = document.getElementById('todo-date');
        const addButton = document.getElementById('add-button');
        const todoList = document.getElementById('todo-list');
        const emptyMsg = document.getElementById('empty-msg');
        const clearAllBtn = document.getElementById('clear-all');

        const countAll = document.getElementById('count-all');
        const countActive = document.getElementById('count-active');
        const countCompleted = document.getElementById('count-completed');

        const today = new Date().toISOString().split('T')[0];
        todoDate.value = today;

        function updateStats() {
            const total = todoList.children.length;
            const completed = todoList.querySelectorAll('li.completed').length;
            const active = total - completed;

            countAll.textContent = total;
            countActive.textContent = active;
            countCompleted.textContent = completed;

            if (total === 0) {
                emptyMsg.style.display = 'block';
            } else {
                emptyMsg.style.display = 'none';
            }
        }

        function addTodo() {
            const taskText = todoInput.value.trim();
            const taskDate = todoDate.value;
            if (taskText === '') return; 

            const li = document.createElement('li');
            
            let isUrgent = false;
            if (taskDate) {
                isUrgent = taskDate <= today;
            }
            if (isUrgent) {
                li.classList.add('urgent');
            }
            
            const dateDisplay = taskDate ? `📅 截止日期: ${taskDate}` : '📅 未設定日期';

            li.innerHTML = `
                <div class="todo-content">
                    <input type="checkbox" onchange="toggleComplete(this)">
                    <div class="text-group">
                        <span class="todo-text">${taskText}</span>
                        <span class="todo-date">${dateDisplay} ${isUrgent ? '⚠️ 快過期或已過期！' : ''}</span>
                    </div>
                </div>
                <button class="delete-btn" onclick="deleteTodo(this)">刪除</button>
            `;

            todoList.appendChild(li);
            todoInput.value = ''; 
            todoDate.value = today; 
            updateStats();
        }

        addButton.addEventListener('click', addTodo);
        todoInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTodo();
        });

        window.toggleComplete = function(checkbox) {
            const li = checkbox.closest('li');
            if (checkbox.checked) {
                li.classList.add('completed');
            } else {
                li.classList.remove('completed');
            }
            updateStats();
        };

        window.deleteTodo = function(button) {
            const li = button.parentElement;
            li.remove();
            updateStats();
        };

        clearAllBtn.addEventListener('click', function() {
            if (confirm('確定要清除所有待辦事項嗎？')) {
                todoList.innerHTML = '';
                updateStats();
            }
        });

        updateStats();
    </script>
</body>
</html>
