<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待辦事項清單</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: linear-gradient(135deg, #6366f1, #a855f7);
            --danger: #ef4444;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .todo-container {
            background: var(--card-dark);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }

        h1 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 26px;
            font-weight: 700;
            background: var(--accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 數據統計區 */
        .stats-container {
            display: flex;
            justify-content: space-between;
            background: #111827;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid #1e293b;
        }
        .stat-item {
            text-align: center;
            flex: 1;
        }
        .stat-item:not(:last-child) {
            border-right: 1px solid #334155;
        }
        .stat-val {
            font-size: 18px;
            font-weight: bold;
            color: #f1f5f9;
        }
        .stat-lbl {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* 輸入區域 */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }
        .input-row {
            display: flex;
            gap: 12px;
        }
        input[type="text"] {
            flex: 1;
            padding: 14px 16px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 10px;
            font-size: 16px;
            color: var(--text-main);
            outline: none;
            transition: all 0.3s;
        }
        input[type="text"]:focus, input[type="date"]:focus {
            border-color: #6366f1;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }
        
        input[type="date"] {
            padding: 12px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            color: var(--text-main);
        }
        
        button.add-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
        }
        
        /* 快速功能 */
        .action-row {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }
        .clear-btn {
            background: none;
            border: 1px solid #475569;
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .clear-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border-color: var(--danger);
        }

        /* 任務清單 */
        ul { list-style: none; padding: 0; margin: 0; }
        li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: #1e293b;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
        }
        li:hover {
            border-color: #475569;
            transform: translateY(-1px);
        }
        
        li.completed {
            background: #0f172a;
            border-color: #1e293b;
            opacity: 0.6;
        }
        li.completed .todo-text, li.completed .todo-date {
            text-decoration: line-through;
            color: var(--text-muted) !important;
        }
        
        .todo-content { display: flex; align-items: center; gap: 14px; cursor: pointer; flex: 1; }
        .text-group { display: flex; flex-direction: column; gap: 4px; }
        .todo-text { font-size: 16px; color: var(--text-main); font-weight: 500; }
        
        .todo-date { font-size: 12px; color: var(--text-muted); }
        .urgent .todo-date { color: var(--danger); font-weight: bold; }
        
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #6366f1;
        }
        
        .delete-btn {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .delete-btn:hover {
            background: var(--danger);
            color: white;
        }
        
        .empty-state { text-align: center; color: var(--text-muted); margin-top: 25px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="todo-container">
        <h1>待辦事項清單</h1>
        
        <div class="stats-container">
            <div class="stat-item">
                <div class="stat-val" id="count-all">0</div>
                <div class="stat-lbl">全部</div>
            </div>
            <div class="stat-item">
                <div class="stat-val" id="count-active">0</div>
                <div class="stat-lbl">進行中</div>
            </div>
            <div class="stat-item">
                <div class="stat-val" id="count-completed">0</div>
                <div class="stat-lbl">已完成</div>
            </div>
        </div>
        
        <div class="input-group">
            <input type="text" id="todo-input" placeholder="新增一項任務...">
            <div class="input-row">
                <input type="date" id="todo-date">
                <button class="add-btn" id="add-button">新增任務</button>
            </div>
        </div>

        <div class="action-row">
            <button class="clear-btn" id="clear-all">清除所有任務</button>
        </div>

        <ul id="todo-list"></ul>
        <div id="empty-msg" class="empty-state">目前沒有任何待辦事項，來新增一個吧！</div>
    </div>

    <script>
        const todoInput = document.getElementById('todo-input');
        const todoDate = document.getElementById('todo-date');
        const addButton = document.getElementById('add-button');
        const todoList = document.getElementById('todo-list');
        const emptyMsg = document.getElementById('empty-msg');
        const clearAllBtn = document.getElementById('clear-all');

        const countAll = document.getElementById('count-all');
        const countActive = document.getElementById('count-active');
        const countCompleted = document.getElementById('count-completed');

        const today = new Date().toISOString().split('T')[0];
        todoDate.value = today;

        function updateStats() {
            const total = todoList.children.length;
            const completed = todoList.querySelectorAll('li.completed').length;
            const active = total - completed;

            countAll.textContent = total;
            countActive.textContent = active;
            countCompleted.textContent = completed;

            if (total === 0) {
                emptyMsg.style.display = 'block';
            } else {
                emptyMsg.style.display = 'none';
            }
        }

        function addTodo() {
            const taskText = todoInput.value.trim();
            const taskDate = todoDate.value;
            if (taskText === '') return; 

            const li = document.createElement('li');
            
            let isUrgent = false;
            if (taskDate) {
                isUrgent = taskDate <= today;
            }
            if (isUrgent) {
                li.classList.add('urgent');
            }
            
            const dateDisplay = taskDate ? `📅 截止日期: ${taskDate}` : '📅 未設定日期';

            li.innerHTML = `
                <div class="todo-content">
                    <input type="checkbox" onchange="toggleComplete(this)">
                    <div class="text-group">
                        <span class="todo-text">${taskText}</span>
                        <span class="todo-date">${dateDisplay} ${isUrgent ? '⚠️ 快過期或已過期！' : ''}</span>
                    </div>
                </div>
                <button class="delete-btn" onclick="deleteTodo(this)">刪除</button>
            `;

            todoList.appendChild(li);
            todoInput.value = ''; 
            todoDate.value = today; 
            updateStats();
        }

        addButton.addEventListener('click', addTodo);
        todoInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTodo();
        });

        function toggleComplete(checkbox) {
            const li = checkbox.closest('li');
            if (checkbox.checked) {
                li.classList.add('completed');
            } else {
                li.classList.remove('completed');
            }
            updateStats();
        }

        function deleteTodo(button) {
            const li = button.parentElement;
            li.remove();
            updateStats();
        }

        clearAllBtn.addEventListener('click', function() {
            if (confirm('確定要清除所有待辦事項嗎？')) {
                todoList.innerHTML = '';
                updateStats();
            }
        });

        updateStats();
    </script>
</body>
</html>
